trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'

stages:
  # ── Stage 1: Build ────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build
    jobs:
      - job: BuildJob
        displayName: npm ci + vite build
        steps:
          - task: NodeTool@0
            displayName: Use Node $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            displayName: Install dependencies

          - script: npm run build
            displayName: Build (vite)

          - task: PublishBuildArtifacts@1
            displayName: Publish dist artifact
            inputs:
              PathtoPublish: dist
              ArtifactName: sxg-knowledge-health
              publishLocation: Container

  # ── Stage 2: Deploy to Azure Static Web Apps ──────────────────────────────
  # To enable:
  #   1. Create an Azure Static Web App (free tier) in the Azure portal
  #   2. Copy the deployment token from: Static Web App → Manage deployment token
  #   3. Add it as a pipeline secret variable named AZURE_STATIC_WEB_APPS_API_TOKEN
  #      (Pipelines → Library → Variable groups, or inline in the pipeline variables)
  #   4. Uncomment the stage below and re-run the pipeline
  #
  # - stage: Deploy
  #   displayName: Deploy to Azure Static Web Apps
  #   dependsOn: Build
  #   condition: succeeded()
  #   jobs:
  #     - job: DeployJob
  #       displayName: Deploy
  #       steps:
  #         - download: current
  #           artifact: sxg-knowledge-health
  #
  #         - task: AzureStaticWebApp@0
  #           displayName: Deploy to Static Web Apps
  #           inputs:
  #             app_location: '$(Pipeline.Workspace)/sxg-knowledge-health'
  #             skip_app_build: true
  #           env:
  #             azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
